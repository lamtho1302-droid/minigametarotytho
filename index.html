<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tarot Web - LamTho</title>

<style>
body{
  font-family:Arial;
  background:linear-gradient(135deg,#ffb6c1,#ffc0cb);
  text-align:center;
  color:#fff;
}
.container{display:none;margin-top:40px;}
.active{display:block;}

input,button,select{
  padding:10px;
  margin:5px;
  border-radius:10px;
  border:none;
}
button{
  background:#ff69b4;
  color:white;
  cursor:pointer;
}

.logout{
  position:absolute;
  right:10px;
  top:10px;
  background:red;
}

.card{
  display:inline-block;
  margin:10px;
  cursor:pointer;
  perspective:1000px;
}

.card-inner{
  width:120px;
  height:180px;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 0.6s;
}

.card.flip .card-inner{
  transform:rotateY(180deg);
}

.card-front, .card-back{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
  border-radius:10px;
}

.card-front{
  background:#fff;
  color:#000;
  transform:rotateY(180deg);
}

.card-back{
  background:#ff69b4;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

img{
  width:100%;
  border-radius:10px;
}

/* ✨ hiệu ứng thanh tẩy */
#purifyEffect{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
  overflow:hidden;
  z-index:9999;
}
.sparkle{
  position:absolute;
  width:8px;
  height:8px;
  background:white;
  border-radius:50%;
  animation:fly 2s linear forwards;
}
@keyframes fly{
  0%{transform:scale(0) translateY(0);opacity:1;}
  100%{transform:scale(1.5) translateY(-200px);opacity:0;}
}

/* Style cho bảng admin */
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
  background: rgba(0,0,0,0.2);
  border-radius: 10px;
}
th, td {
  padding: 10px;
  border: 1px solid #fff;
}
</style>
</head>

<body>

<button id="logoutBtn" class="logout" style="display:none;" onclick="logout()">Đăng xuấtttt</button>

<div id="purifyEffect"></div>

<div id="login" class="container active">
<h2>Đăng nhập đi ng dpp</h2>
<input id="loginUser" placeholder="Tên đăng nhậpp"><br>
<input id="loginPass" type="password" placeholder="Mật khẩuu"><br>
<button onclick="login()">Đăng nhậpp</button>
<button onclick="show('register')">Đăngg ký</button>
</div>

<div id="register" class="container">
<h2>Đăngg ký đi ng dpp</h2>
<input id="regUser" placeholder="Tên đăng nhậpp"><br>
<input id="regPass" type="password" placeholder="Mật khẩu của ng dp"><br>
<button onclick="register()">Tạo tài khoảnn</button>
<button onclick="show('login')">Quay lại đăng nhập</button>
</div>

<div id="adminPanel" class="container">
<h2>Trang Quản Trị Admin</h2>
<p>Tổng số tài khoản đã tạo: <b id="totalUsersCount">0</b></p>
<div id="adminUserList" style="overflow-x:auto;"></div>
</div>

<div id="main" class="container">
<h2>Rút bài Tarot xíu đi nèe</h2>
<p id="drawsInfo" style="color: yellow; font-weight: bold;"></p>
<input id="nameInput" placeholder="Nhập tên đi ng dpp"><br>
<input id="birth" type="date"><br>
<button onclick="saveProfile()">Lưu thông tin nhaa</button>
<select id="mode">
<option value="3">Rút 3 láaa</option>
<option value="5" selected>Rút 5 láaa</option>
</select><br>

<button onclick="startDraw()">Rútt bàii</button>
<button onclick="showHistory()">Lịch sử xem Tarot</button>
</div>

<div id="focus" class="container">
<h2>Tập trung nghĩ về câu hỏi đii ng dpp</h2>
<h1 id="count">7</h1>
<button onclick="skip()">oki tiếp (tua nhanh)</button>
<div id="drawNow" style="display:none;">
<button onclick="drawCards()">Rút bài ngayyy</button>
</div>
</div>

<div id="result" class="container">
<h2 id="resultTitle"></h2>
<div id="cards"></div>
<p id="message"></p>


<button style="margin-top:70px;" onclick="show('main')">Trangg chủ</button>
</div>

<div id="history" class="container">
<h2>Lịch sử xem tarot</h2>
<div id="historyList"></div>
<button onclick="deleteSelected()">🗑 Xóa ls đã chọnn</button>
<button onclick="deleteAllHistory()">💥 Xóa toàn bộ ls xem tarot</button>
<button onclick="show('main')">Quay lạiii</button>
</div>

<script>
function deleteAllHistory(){
  if(!confirm("Xóa hết lịch sử luôn hả? 😢")) return;
  histories[currentUser] = [];
  localStorage.setItem("histories", JSON.stringify(histories));
  showHistory();
}

let users = JSON.parse(localStorage.getItem("users")) || {};
let histories = JSON.parse(localStorage.getItem("histories")) || {};
let profiles = JSON.parse(localStorage.getItem("profiles")) || {};
let userStats = JSON.parse(localStorage.getItem("userStats")) || {}; 
let currentUser = "";
let timer;

for(let u in users) {
    if(!userStats[u]) {
        userStats[u] = { approved: false, draws3: 0, draws5: 0 };
    } else {
        if(userStats[u].draws3 === undefined) userStats[u].draws3 = 0;
        if(userStats[u].draws5 === undefined) {
            userStats[u].draws5 = userStats[u].drawsLeft || 0; 
            delete userStats[u].drawsLeft;
        }
    }
}
localStorage.setItem("userStats", JSON.stringify(userStats));


let tarot = [
{name:"The Fool",img:"m00.jpg"},
{name:"The Magician",img:"m01.jpg"},
{name:"The High Priestess",img:"m02.jpg"},
{name:"The Empress",img:"m03.jpg"},
{name:"The Emperor",img:"m04.jpg"},
{name:"The Hierophant",img:"m05.jpg"},
{name:"The Lovers",img:"m06.jpg"},
{name:"The Chariot",img:"m07.jpg"},
{name:"Strength",img:"m08.jpg"},
{name:"The Hermit",img:"m09.jpg"},
{name:"Wheel of Fortune",img:"m10.jpg"},
{name:"Justice",img:"m11.jpg"},
{name:"The Hanged Man",img:"m12.jpg"},
{name:"Death",img:"m13.jpg"},
{name:"Temperance",img:"m14.jpg"},
{name:"The Devil",img:"m15.jpg"},
{name:"The Tower",img:"m16.jpg"},
{name:"The Star",img:"m17.jpg"},
{name:"The Moon",img:"m18.jpg"},
{name:"The Sun",img:"m19.jpg"},
{name:"Judgement",img:"m20.jpg"},
{name:"The World",img:"m21.jpg"},
];

const suits = ["Cups","Pentacles","Swords","Wands"];
const ranks = ["Ace","2","3","4","5","6","7","8","9","10","Page","Knight","Queen","King"];

suits.forEach(s=>{
ranks.forEach(r=>{
tarot.push({name:`${r} of ${s}`,img:"anphuu.PNG"});
});
});

function show(id){
document.querySelectorAll('.container').forEach(e=>e.classList.remove('active'));
document.getElementById(id).classList.add('active');

if(id !== 'login' && id !== 'register') {
    document.getElementById('logoutBtn').style.display = 'block';
} else {
    document.getElementById('logoutBtn').style.display = 'none';
}

if(id === 'main') {
    updateDrawsInfo();
}
}

function register(){
let u = regUser.value.trim();
let p = regPass.value.trim();

if(!u) return alert("Nhập tên đăng nhập đii");
if(!p) return alert("Nhập mật khẩu đii ng dpp");
if(u === "ytho1302") return alert("Tên này dành riêng cho Admin!");
if(users[u]) return alert("Tài khoản đã tồn tại ròiii");

users[u] = p; // Lưu mật khẩu thực tế
userStats[u] = { approved: false, draws3: 0, draws5: 0 }; 

localStorage.setItem("users",JSON.stringify(users));
localStorage.setItem("userStats",JSON.stringify(userStats));

alert("Tạo tài khoản thành công rùi nhaaa! Nhớ mật khẩu đó.");
show('login');
}

function login(){
let u=loginUser.value.trim();
let p=loginPass.value;

// TÀI KHOẢN ADMIN
if(u === "ytho1302" && p === "217465adminytho"){
    currentUser = "admin";
    showAdmin();
    return;
}

// Check mật khẩu người dùng đã lưu
if(users[u] && p === users[u]){
    currentUser=u;
    if(profiles[currentUser]){
        nameInput.value = profiles[currentUser].name || "";
        birth.value = profiles[currentUser].birth || "";
    }else{
        nameInput.value = "";
        birth.value = "";
    }
    show('main');
}else {
    alert("Sai mật khẩu hoặc tài khoản ròiii ng dp");
}
}

function logout(){
currentUser="";
loginUser.value = "";
loginPass.value = "";
show('login');
}

// ================= PHẦN ADMIN =================
function showAdmin(){
    show('adminPanel');
    renderAdminUserList();
}

function renderAdminUserList() {
    let count = Object.keys(users).length;
    document.getElementById('totalUsersCount').innerText = count;

    let html = "<table><tr><th>Tài khoản</th><th>Mật khẩu</th><th>Trạng thái</th><th>Lượt 3</th><th>Lượt 5</th><th>Hành động</th></tr>";
    for(let u in users) {
        let stats = userStats[u];
        let statusTxt = stats.approved ? "<span style='color:lightgreen'>Đã duyệt</span>" : "<span style='color:yellow'>Chưa duyệt</span>";
        
        html += `<tr>
            <td>${u}</td>
            <td style="color: #00ffff; font-weight: bold;">${users[u]}</td>
            <td>${statusTxt}</td>
            <td><b>${stats.draws3}</b></td>
            <td><b>${stats.draws5}</b></td>
            <td style="text-align:left;">
                ${!stats.approved ? `<button onclick="toggleApprove('${u}', true)" style="background:green;padding:5px;margin-bottom:5px;width:100%;">Duyệt</button>` : `<button onclick="toggleApprove('${u}', false)" style="background:orange;padding:5px;margin-bottom:5px;width:100%;">Hủy Duyệt</button>`}<br>
                
                <input type="number" id="draw3_${u}" style="width:40px; padding:5px; margin:0;" placeholder="+/-">
                <button onclick="addDraws('${u}', 3)" style="background:blue;padding:5px;margin-bottom:5px;">+</button>
                <button onclick="subDraws('${u}', 3)" style="background:darkblue;padding:5px;margin-bottom:5px;">-</button><br>
                
                <input type="number" id="draw5_${u}" style="width:40px; padding:5px; margin:0;" placeholder="+/-">
                <button onclick="addDraws('${u}', 5)" style="background:purple;padding:5px;margin-bottom:5px;">+</button>
                <button onclick="subDraws('${u}', 5)" style="background:indigo;padding:5px;margin-bottom:5px;">-</button><br>
                
                <button onclick="deleteUser('${u}')" style="background:red;padding:5px;width:100%;">Xóa</button>
            </td>
        </tr>`;
    }
    html += "</table>";
    document.getElementById('adminUserList').innerHTML = html;
}

function toggleApprove(u, status) {
    userStats[u].approved = status;
    localStorage.setItem("userStats", JSON.stringify(userStats));
    renderAdminUserList();
}

function addDraws(u, type) {
    let val = parseInt(document.getElementById(`draw${type}_${u}`).value);
    if(isNaN(val) || val <= 0) return alert("Nhập số lượt hợp lệ!");
    
    if(type === 3) userStats[u].draws3 += val;
    if(type === 5) userStats[u].draws5 += val;
    
    localStorage.setItem("userStats", JSON.stringify(userStats));
    renderAdminUserList();
}

function subDraws(u, type) {
    let val = parseInt(document.getElementById(`draw${type}_${u}`).value);
    if(isNaN(val) || val <= 0) return alert("Nhập số lượt hợp lệ!");
    
    if(type === 3) userStats[u].draws3 = Math.max(0, userStats[u].draws3 - val);
    if(type === 5) userStats[u].draws5 = Math.max(0, userStats[u].draws5 - val);
    
    localStorage.setItem("userStats", JSON.stringify(userStats));
    renderAdminUserList();
}

function deleteUser(u) {
    if(confirm(`Xóa vĩnh viễn tài khoản ${u} hả ytho?`)){
        delete users[u];
        delete userStats[u];
        delete histories[u];
        delete profiles[u];
        
        localStorage.setItem("users", JSON.stringify(users));
        localStorage.setItem("userStats", JSON.stringify(userStats));
        localStorage.setItem("histories", JSON.stringify(histories));
        localStorage.setItem("profiles", JSON.stringify(profiles));
        
        renderAdminUserList();
    }
}
// ================= KẾT THÚC ADMIN =================

function updateDrawsInfo() {
    if(currentUser && currentUser !== "admin") {
        let stats = userStats[currentUser];
        let info = document.getElementById("drawsInfo");
        if(!stats.approved) {
            info.innerText = "Tài khoản chưa được ytho duyệt. Không thể rút bài!";
            info.style.color = "red";
        } else {
            info.innerHTML = `Lượt 3 lá: <span style="color:#fff">${stats.draws3}</span> | Lượt 5 lá: <span style="color:#fff">${stats.draws5}</span>`;
            info.style.color = "yellow";
        }
    }
}

function startDraw(){
if(!nameInput.value.trim()) return alert("Nhập tên đii ng dpp");

let num = parseInt(mode.value);
let stats = userStats[currentUser];

if(!stats.approved) {
    return alert("Tài khoản của bạn chưa được ytho duyệt!");
}

if(num === 3) {
    if(stats.draws3 <= 0) return alert("ng dp đã hết lượt rút 3 lá ròi hãy mua thêm lượt từ ytho nhaaa!");
    stats.draws3 -= 1;
} else if (num === 5) {
    if(stats.draws5 <= 0) return alert("ng dp đã hết lượt rút 5 lá ròi hãy mua thêm lượt từ ytho nhaaa!");
    stats.draws5 -= 1;
}

localStorage.setItem("userStats", JSON.stringify(userStats));
updateDrawsInfo();

show('focus');
drawNow.style.display="none";
let c=7;
count.innerText=c;
clearInterval(timer);
timer=setInterval(()=>{
c--;
count.innerText=c;
if(c<=0){
clearInterval(timer);
drawNow.style.display="block";
}
},1000);
}

function skip(){
clearInterval(timer);
drawNow.style.display="block";
}

function drawCards(){
profiles[currentUser] = {
name: nameInput.value,
birth: birth.value
};
localStorage.setItem("profiles", JSON.stringify(profiles));
show('result');
let num = parseInt(mode.value);
resultTitle.innerText = `Kết quả (${num} lá)`;
let shuffled=[...tarot].sort(()=>0.5-Math.random());
let selected=shuffled.slice(0,num);

let html="";
selected.forEach(card=>{
html+=`
<div class="card" onclick="this.classList.toggle('flip')">
<div class="card-inner">
<div class="card-back">Tarot ytho</div>
<div class="card-front">
<img src="${card.img}">
<p>${card.name}</p>
</div>
</div>
</div>
`;
});
cards.innerHTML=html;

if(!histories[currentUser]) histories[currentUser]=[];
histories[currentUser].push({
time:new Date().toLocaleString(),
cards:selected.map(c=>c.name)
});
localStorage.setItem("histories",JSON.stringify(histories));
}

function showHistory(){
show('history');
let list=histories[currentUser]||[];
let html="";
list.forEach((i,index)=>{
html+=`
<p>
<input type="checkbox" class="hisCheck" value="${index}">
<b>${i.time}</b><br>${i.cards.join(", ")}
</p><hr>
`;
});
historyList.innerHTML=html || "Chưa có lịch sử xemm";
}

function deleteSelected(){
let checks=document.querySelectorAll(".hisCheck:checked");
let list=histories[currentUser]||[];
checks.forEach(c=>{ list[c.value]=null; });
histories[currentUser]=list.filter(x=>x!==null);
localStorage.setItem("histories",JSON.stringify(histories));
showHistory();
}

let music = new Audio("nhac.mp3");
music.loop = true;
function toggleMusic(){
if(music.paused){ music.play(); alert("🎵 mở nhạc ròiii"); }
else{ music.pause(); alert("🔇 tắt nhạc ròii"); }
}

function purify(){
if(!currentUser) return alert("Đăng nhập mới thanh tẩy đc nhaaa");
let container = document.getElementById("purifyEffect");
for(let i=0;i<50;i++){
let s=document.createElement("div");
s.className="sparkle";
s.style.left=Math.random()*100+"%";
s.style.top=Math.random()*100+"%";
container.appendChild(s);
setTimeout(()=>s.remove(),2000);
}
alert("✨ Thanh tẩy xong rùi 🔮");
}

let btn = document.createElement("button");
btn.innerText="🎵 Nhạc chill";
btn.style.position="fixed"; btn.style.bottom="10px"; btn.style.right="10px";
btn.onclick=toggleMusic;
document.body.appendChild(btn);

let btn2 = document.createElement("button");
btn2.innerText="🌙 Thanh tẩy";
btn2.style.position="fixed"; btn2.style.bottom="50px"; btn2.style.right="10px";
btn2.onclick=purify;
document.body.appendChild(btn2);

function saveProfile(){
if(!currentUser) return alert("Đăng nhập đi ng dpp");
profiles[currentUser] = { name: nameInput.value, birth: birth.value };
localStorage.setItem("profiles", JSON.stringify(profiles));
alert("Lưu thông tin thành công ròi ạaa 💖");
}

</script>
</body>
</html>
