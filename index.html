<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tarot Web - LamTho </title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<style>
body{
  font-family:Arial;
  background:linear-gradient(135deg,#ffb6c1,#ffc0cb);
  text-align:center;
  color:#fff;
  margin: 0;
  padding: 0;
}
.container{display:none;margin-top:40px; padding: 20px;}
.active{display:block;}

input,button,select{
  padding:10px;
  margin:5px;
  border-radius:10px;
  border:none;
  outline: none;
}
button{
  background:#ff69b4;
  color:white;
  cursor:pointer;
  font-weight: bold;
}
button:hover{ background: #ff1493; }

.logout{
  position:absolute;
  right:10px;
  top:10px;
  background:red;
  z-index: 100;
}

.card{
  display:inline-block;
  margin:10px;
  cursor:pointer;
  perspective:1000px;
}

.card-inner{
  width:120px;
  height:180px;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 0.6s;
}

.card.flip .card-inner{
  transform:rotateY(180deg);
}

.card-front, .card-back{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
  border-radius:10px;
  border: 2px solid gold;
}

.card-front{
  background:#fff;
  color:#000;
  transform:rotateY(180deg);
}

.card-back{
  background-image: url('matsau.png');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  font-size: 14px;
  color: white;
  text-shadow: 1px 1px 3px black;
}

img{
  width:100%;
  height: 80%;
  object-fit: contain; 
  border-radius:10px 10px 0 0;
}

/* ✨ hiệu ứng thanh tẩy */
#purifyEffect{
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  pointer-events:none;
  overflow:hidden;
  z-index:9999;
}
.sparkle{
  position:absolute;
  width:8px; height:8px;
  background:white;
  border-radius:50%;
  animation:fly 2s linear forwards;
}
@keyframes fly{
  0%{transform:scale(0) translateY(0);opacity:1;}
  100%{transform:scale(1.5) translateY(-200px);opacity:0;}
}

/* Style cho bảng admin */
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
  background: rgba(0,0,0,0.4);
  border-radius: 10px;
  font-size: 13px;
}
th, td {
  padding: 8px;
  border: 1px solid rgba(255,255,255,0.2);
}
th { background: #ff69b4; }
</style>
</head>

<body>

<button id="logoutBtn" class="logout" style="display:none;" onclick="logout()">Đăng xuấtttt</button>

<div id="purifyEffect"></div>

<div id="login" class="container active">
<h2>Đăng nhập đi ng dpp</h2>
<input id="loginUser" placeholder="Tên đăng nhậpp"><br>
<input id="loginPass" type="password" placeholder="Mật khẩuu"><br>
<button onclick="login()">Đăng nhậpp</button>
<button onclick="show('register')">Đăngg ký</button>
<br><br>
<button onclick="toggleMusic()">🎵 Nhạc =)))</button>
<button onclick="purify()">🌙 Thanh tẩy</button>
</div>

<div id="register" class="container">
<h2>Đăngg ký đi ng dpp</h2>
<input id="regUser" placeholder="Tên đăng nhậpp"><br>
<input id="regPass" type="password" placeholder="Mật khẩu của ng dp"><br>
<button onclick="register()">Tạo tài khoảnn</button>
<button onclick="show('login')">Quay lại đăng nhập</button>
<br><br>
<button onclick="toggleMusic()">🎵 Nhạc =)))</button>
<button onclick="purify()">🌙 Thanh tẩy</button>
</div>

<div id="adminPanel" class="container">
<h2>Quản Trị Viên Ý Thơ</h2>
<p>Tổng số tài khoản: <b id="totalUsersCount">0</b></p>
<div id="adminUserList" style="overflow-x:auto;"></div>
<button onclick="logout()" style="margin-top: 20px; background: gray;">Thoát Admin</button>
</div>

<div id="main" class="container">
<h2>Rút bài Tarot xíu đi nèe</h2>
<p id="drawsInfo"></p>
<input id="nameInput" placeholder="Nhập tên đi ng dpp"><br>
<input id="birthInput" placeholder="Nhập ngày/tháng/năm sinh"><br>
<button onclick="saveProfile()">Lưu thông tin nhaa</button>
<br>
<select id="mode">
<option value="3">Rút 3 láaa</option>
<option value="5" selected>Rút 5 láaa</option>
</select><br>

<button onclick="startDraw()">Rútt bàii</button>
<button onclick="showHistory()">Lịch sử xem Tarot</button>
<br><br>
<button onclick="toggleMusic()">🎵 Nhạc =)))</button>
<button onclick="purify()">🌙 Thanh tẩy</button>
</div>

<div id="focus" class="container">
<h2>Tập trung nghĩ về câu hỏi đii ng dpp</h2>
<h1 id="count">7</h1>
<button onclick="skip()">oki tiếp (tua nhanh)</button>
<div id="drawNow" style="display:none;">
<button onclick="drawCards()">Rút bài ngayyy</button>
</div>
</div>

<div id="result" class="container">
<h2 id="resultTitle"></h2>
<div id="cards"></div>
<p id="message"></p>
<button style="margin-top:30px;" onclick="show('main')">Trangg chủ</button>
</div>

<div id="history" class="container">
<h2>Lịch sử xem tarot</h2>
<button onclick="deleteSelected()">🗑 Xóa mục đã chọn</button>
<button onclick="deleteAllHistory()">💥 Xóa hết lịch sử</button>

</div>

function show(id){
    document.querySelectorAll('.container').forEach(e=>e.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.getElementById('logoutBtn').style.display = (id === 'login' || id === 'register' || id === 'adminPanel') ? 'none' : 'block';
}

function register(){
    let u = regUser.value.trim();
    let p = regPass.value.trim();
    if(!u || !p) return alert("Nhập đủ thông tin đii ng dp");
    if(u === "ytho1302") return alert("Tên này của ytho mà!");
    if(users[u]) return alert("Tài khoản này có ng dùng ròii");

    db.ref(`users/${u}`).set(p);
    db.ref(`userStats/${u}`).set({ approved: false, draws3: 0, draws5: 0 });
    alert("Đăng ký xong rùi! Đợi ytho duyệt mới được rút bài nha.");
    show('login');
}

function login(){
    let u = loginUser.value.trim();
    let p = loginPass.value;

    if(u === "ytho1302" && p === "217465adminytho"){
        currentUser = "admin";
        show('adminPanel');
        return;
    }

    if(users[u] && users[u] === p){
        currentUser = u;
        nameInput.value = (profiles[u] && profiles[u].name) ? profiles[u].name : "";
        birthInput.value = (profiles[u] && profiles[u].birth) ? profiles[u].birth : "";
        
        // ✨ ĐÃ SỬA CHỖ NÀY: Gọi hiển thị lượt ngay khi vừa đăng nhập xong
        updateDrawsInfo(); 
        
        show('main');
    } else {
        alert("Sai tài khoản hoặc mật khẩu ròii ng dp ơii");
    }
}

function logout(){
    currentUser = "";
    loginUser.value = ""; loginPass.value = "";
    drawsInfo.innerHTML = ""; // Xóa dòng hiển thị lượt khi đăng xuất
    show('login');
}

// --- ADMIN LOGIC ---
function renderAdminUserList() {
    let keys = Object.keys(users);
    document.getElementById('totalUsersCount').innerText = keys.length;
    let html = `<table><tr><th>User</th><th>Pass</th><th>Duyệt</th><th>Lượt 3|5</th><th>Lệnh</th></tr>`;
    keys.forEach(u => {
        let s = userStats[u] || {approved: false, draws3:0, draws5:0};
        html += `<tr>
            <td>${u}</td>
            <td style="color:cyan">${users[u]}</td>
            <td>${s.approved ? '✅' : '❌'}</td>
            <td>${s.draws3}|${s.draws5}</td>
            <td>
                <button onclick="db.ref('userStats/${u}/approved').set(${!s.approved})" style="background:${s.approved?'orange':'green'}; padding:3px">Duyệt/Huỷ</button>
<div style="margin-top:5px">
  <small>3 lá:</small>
  <input type="number" id="val3_${u}" value="1" min="1" style="width:40px; padding:2px; margin:0; color:black;">
  <button onclick="adjustDrawInput('${u}', 3, 1)" style="background:blue; padding:2px 5px">+</button>
  <button onclick="adjustDrawInput('${u}', 3, -1)" style="background:darkblue; padding:2px 5px">-</button>
</div>
<div style="margin-top:5px">
  <small>5 lá:</small>
  <input type="number" id="val5_${u}" value="1" min="1" style="width:40px; padding:2px; margin:0; color:black;">
  <button onclick="adjustDrawInput('${u}', 5, 1)" style="background:purple; padding:2px 5px">+</button>
  <button onclick="adjustDrawInput('${u}', 5, -1)" style="background:indigo; padding:2px 5px">-</button>
</div>
                <button onclick="deleteUser('${u}')" style="background:red">Xoá</button>
            </td>
        </tr>`;
    });
    html += `</table>`;
    adminUserList.innerHTML = html;
}

function adjustDrawInput(u, type, sign) {
    let val = parseInt(document.getElementById(`val${type}_${u}`).value) || 1;
    adjustDraw(u, type, val * sign);
}

function adjustDraw(u, type, amount) {
    let current = (userStats[u] && userStats[u][`draws${type}`]) ? userStats[u][`draws${type}`] : 0;
    db.ref(`userStats/${u}/draws${type}`).set(Math.max(0, current + amount));
}

function deleteUser(u) {
    if(confirm(`Xóa sạch dữ liệu của ${u}?`)) {
        db.ref(`users/${u}`).remove();
        db.ref(`userStats/${u}`).remove();
        db.ref(`profiles/${u}`).remove();
        db.ref(`histories/${u}`).remove();
    }
}

// --- USER LOGIC ---
function updateDrawsInfo() {
    let s = userStats[currentUser] || {approved: false, draws3:0, draws5:0};
    drawsInfo.innerHTML = s.approved ? 
        `Số lượt nàng có làaa: <span style="color:#6A0DAD">3 lá: ${s.draws3} | 5 lá: ${s.draws5}</span>` : 
        `<span style="color:red">Tài khoản này chưa được ytho duyệt hãy ib cho ytho để được duyệt nhaa!</span>`;
}

function saveProfile(){
    if(!currentUser) return;
    db.ref(`profiles/${currentUser}`).set({ name: nameInput.value, birth: birthInput.value });
    alert("Đã lưu thông tin ròi ạa! ✨");
}

function startDraw(){
    let num = parseInt(mode.value);
    let s = userStats[currentUser] || {};
    if(!s.approved) return alert(" được ytho duyệt mới rút bài được nhaa ng dp!");
    if(num === 3 && s.draws3 <= 0) return alert("Hết lượt 3 lá ròi, ib ytho để mua thêm lượt nhaa!");
    if(num === 5 && s.draws5 <= 0) return alert("Hết lượt 5 lá ròi, ib ytho để mua thêm lượt nhaa!");

    db.ref(`userStats/${currentUser}/draws${num}`).set(s[`draws${num}`] - 1);
    
    show('focus');
    drawNow.style.display="none";
    let c = 7; count.innerText = c;
    clearInterval(timer);
    timer = setInterval(() => {
        c--; count.innerText = c;
        if(c <= 0) { clearInterval(timer); drawNow.style.display = "block"; }
    }, 1000);
}

function skip(){ clearInterval(timer); drawNow.style.display="block"; }

function drawCards(){
    show('result');
    let num = parseInt(mode.value);
    resultTitle.innerText = `Kết quả của trải bài của ${nameInput.value || 'bạn'} (${num} lá)`;
    let shuffled = [...tarot].sort(() => 0.5 - Math.random());
    let selected = shuffled.slice(0, num);

    let html = "";
    let historyCards = []; 

    selected.forEach(card => {
        // Tỉ lệ 10% ra bài ngược
        let isReversed = Math.random() < 0.1; 
        
        // Nếu ngược thì thêm chữ (Ngược), xuôi thì giữ nguyên
        let finalCardName = isReversed ? card.name + " (Ngược)" : card.name;
        
        // Cú pháp CSS xoay hình 180 độ nếu là bài ngược
        let imgStyle = isReversed ? 'style="transform: rotate(180deg);"' : '';

        // Đẩy tên vào mảng lịch sử
        historyCards.push(finalCardName);

        html += `<div class="card" onclick="this.classList.toggle('flip')">
            <div class="card-inner">
                <div class="card-back"></div>
                <div class="card-front">
                    <img src="${card.img}" ${imgStyle}>
                    <p style="font-size:10px">${finalCardName}</p>
                </div>
            </div>
        </div>`;
    });
    cards.innerHTML = html;

    let userHis = histories[currentUser] || [];
    userHis.push({ time: new Date().toLocaleString(), cards: historyCards });
    db.ref(`histories/${currentUser}`).set(userHis);
}

// Chạy vòng lặp ngược để lịch sử mới lên đầu
function showHistory(){
    show('history');
    let list = histories[currentUser] || [];
    let html = "";
    if(list.length > 0) {
        for(let i = list.length - 1; i >= 0; i--) {
            let h = list[i];
            if(h) html += `<p><input type="checkbox" class="hisCheck" value="${i}"> <b>${h.time}</b><br>${h.cards.join(", ")}</p><hr>`;
        }
    }
    historyList.innerHTML = html || "Chưa có lần xem nào hết áaa.";
}

function deleteSelected(){
    let list = histories[currentUser] || [];
    let checkedNodes = document.querySelectorAll(".hisCheck:checked");
    
    if(checkedNodes.length === 0) return alert("Chọn mục để xóa đi ng dpp!");
    
    let indicesToDelete = Array.from(checkedNodes).map(c => parseInt(c.value));
    
    let newList = list.filter((_, index) => !indicesToDelete.includes(index));
    
    db.ref(`histories/${currentUser}`).set(newList).then(() => {
        histories[currentUser] = newList; 
        showHistory(); 
    });
}

function deleteAllHistory(){
    if(confirm("Xóa sạch sành sanh luôn hả ng dp?")) {
        db.ref(`histories/${currentUser}`).remove().then(() => {
            histories[currentUser] = []; 
            showHistory(); 
        });
    }
}

// Nhạc & Thanh tẩy
let music = new Audio("nhac.mp3"); music.loop = true;
function toggleMusic(){ music.paused ? music.play() : music.pause(); }

function purify(){
    if(!currentUser || currentUser === "") {
        alert("Đăng nhập vào rùi mới xài được tính năng thanh tẩy nha ng dpp!");
        return;
    }

    let container = document.getElementById("purifyEffect");
    for(let i=0; i<50; i++){
        let s = document.createElement("div"); s.className = "sparkle";
        s.style.left = Math.random()*100+"%"; s.style.top = Math.random()*100+"%";
        container.appendChild(s); setTimeout(() => s.remove(), 2000);
    }
    alert("✨ Đã thanh tẩy năng lượng tiêu cực! 🔮");
}

</script>
</body>
</html>
