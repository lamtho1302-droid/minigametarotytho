<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tarot Web - LamTho</title>

<style>
body{
  font-family:Arial;
  background:linear-gradient(135deg,#ffb6c1,#ffc0cb);
  text-align:center;
  color:#fff;
}
.container{display:none;margin-top:40px;}
.active{display:block;}

input,button{
  padding:10px;
  margin:5px;
  border-radius:10px;
  border:none;
}

button{
  background:#ff69b4;
  color:white;
  cursor:pointer;
}

.logout{
  position:absolute;
  right:10px;
  top:10px;
  background:red;
}

.card{
  display:inline-block;
  margin:10px;
  transition:0.5s;
}

.card:hover{transform:scale(1.1);}

img{
  width:120px;
  border-radius:10px;
}

.flip{
  animation:flip 0.6s ease;
}

@keyframes flip{
from{transform:rotateY(90deg);opacity:0}
to{transform:rotateY(0);opacity:1}
}
</style>
</head>

<body>

<button class="logout" onclick="logout()">Đăng xuất</button>

<!-- LOGIN -->
<div id="login" class="container active">
<h2>Đăng nhập đii nèee</h2>
<input id="loginUser" placeholder="Tên đăng nhập"><br>
<input id="loginPass" type="password" placeholder="Mật khẩu"><br>
<button onclick="login()">Đăng nhập</button>
<button onclick="show('register')">Đăng ký</button>
</div>

<!-- REGISTER -->
<div id="register" class="container">
<h2>Đăng ký</h2>
<input id="regUser" placeholder="Tên đăng nhập"><br>
<p>Mật khẩu mặc định: <b>lamthotarot</b></p>
<button onclick="register()">Tạo tài khoản</button>
</div>

<!-- MAIN -->
<div id="main" class="container">
<h2>Rút bài Tarot đii nèee</h2>

<input id="nameInput" placeholder="Nhập tên (bắt buộc)"><br>
<input id="birth" type="date"><br>

<button onclick="startDraw()">Rútt bài</button>
<button onclick="showHistory()">Lịch sử xem</button>
</div>

<!-- FOCUS -->
<div id="focus" class="container">
<h2>Tập trung nghĩ về câu muốn hỏi đii ng dpp</h2>
<h1 id="count">7</h1>

<button id="skipBtn" onclick="skip()">tua luônnn</button>

<!-- 🔥 nút rút bài (ẩn ban đầu) -->
<div id="drawNow" style="display:none;">
<button onclick="drawCards()">Rút bài ngayy</button>
</div>
</div>

<!-- RESULT -->
<div id="result" class="container">
<h2>Kết quả (5 lá)</h2>
<div id="cards"></div>
<p id="message"></p>
<button onclick="show('main')">Trang chủ</button>
</div>

<!-- HISTORY -->
<div id="history" class="container">
<h2>Lịch sử</h2>
<div id="historyList"></div>
<button onclick="show('main')">Quay lạiii</button>
</div>

<script>

let users = JSON.parse(localStorage.getItem("users")) || {};
let histories = JSON.parse(localStorage.getItem("histories")) || {};
let currentUser = "";
let timer;

// ===== 78 LÁ =====
let tarot = [
{name:"The Fool",img:"m04.jpg"},
{name:"The Magician",img:"m01.jpg"},
{name:"The High Priestess",img:"m02.jpg"},
{name:"The Empress",img:"m03.jpg"},
{name:"The Emperor",img:"m04 (1).jpg"},
{name:"The Hierophant",img:"m05.jpg"},
{name:"The Lovers",img:"m06.jpg"},
{name:"The Chariot",img:"m07.jpg"},
{name:"Strength",img:"m08.jpg"},
{name:"The Hermit",img:"m09.jpg"},
{name:"Wheel of Fortune",img:"m10.jpg"},
{name:"Justice",img:"m11.jpg"},
{name:"The Hanged Man",img:"m12.jpg"},
{name:"Death",img:"m13.jpg"},
{name:"Temperance",img:"m14.jpg"},
{name:"The Devil",img:"m15.jpg"},
{name:"The Tower",img:"m16.jpg"},
{name:"The Star",img:"m17.jpg"},
{name:"The Moon",img:"m18.jpg"},
{name:"The Sun",img:"m19.jpg"},
{name:"Judgement",img:"m20.jpg"},
{name:"The World",img:"m21.jpg"},
];

const suits = [
{name:"Cups"},
{name:"Pentacles"},
{name:"Swords"},
{name:"Wands"}
];

const ranks = ["Ace","2","3","4","5","6","7","8","9","10","Page","Knight","Queen","King"];

suits.forEach(suit=>{
ranks.forEach(rank=>{
tarot.push({
name: rank + " of " + suit.name,
img: "anphuu.PNG"
});
});
});

// ===== UI =====
function show(id){
document.querySelectorAll('.container').forEach(e=>e.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

// ===== REGISTER =====
function register(){
let u = regUser.value.trim();

if(!u){alert("Nhập tên đii ng dpp");return;}

if(users[u]){
alert("Tài khoản đã tồn tại → đăng nhập đi ng dpp");
show('login');
return;
}

users[u] = "lamthotarot";
localStorage.setItem("users", JSON.stringify(users));

alert("Đăng ký thành công ròiiii");
show('login');
}

// ===== LOGIN =====
function login(){
let u = loginUser.value.trim();
let p = loginPass.value;

if(users[u] && p==="lamthotarot"){
currentUser = u;
show('main');
}else{
alert("Sai tài khoản hoặc mật khẩu ròiii");
}
}

// ===== LOGOUT =====
function logout(){
currentUser="";
show('login');
}

// ===== START =====
function startDraw(){
let name = nameInput.value.trim();

if(!name){
alert("Nhập tên mới được rút nha ng dpp");
return;
}

show('focus');

// reset UI
drawNow.style.display="none";

let c=7;
count.innerText=c;

clearInterval(timer);

timer = setInterval(()=>{
c--;
count.innerText=c;

if(c<=0){
clearInterval(timer);

// 🔥 hiện nút rút bài
drawNow.style.display="block";
}
},1000);
}

// ===== SKIP =====
function skip(){
clearInterval(timer);

// 🔥 hiện nút rút bài
drawNow.style.display="block";
}

// ===== DRAW 5 LÁ =====
function drawCards(){
show('result');

let shuffled=[...tarot].sort(()=>0.5-Math.random());
let selected=shuffled.slice(0,5);

let html="";

selected.forEach(card=>{
html+=`
<div class="card flip">
<img src="${card.img}">
<p>${card.name}</p>
</div>
`;
});

cards.innerHTML=html;
message.innerText="chúc người dp chơi vui vẻ và luôn bình an nhaaa";

// SAVE HISTORY
if(!histories[currentUser]) histories[currentUser]=[];

histories[currentUser].push({
time:new Date().toLocaleString(),
cards:selected.map(c=>c.name)
});

localStorage.setItem("histories", JSON.stringify(histories));
}

// ===== HISTORY =====
function showHistory(){
show('history');

let list = histories[currentUser] || [];
let html="";

if(list.length===0){
html="Chưa có lịch sử xem ạaaa";
}else{
list.slice().reverse().forEach(item=>{
html+=`
<p><b>${item.time}</b><br>${item.cards.join(", ")}</p><hr>
`;
});
}

historyList.innerHTML=html;
}

</script>

</body>
</html>
